<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Prayer">
<meta name="theme-color" content="#062d22">
<title>Prayer</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#062d22;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}
#prayer{
  font-size:clamp(72px,22vw,160px);
  font-weight:800;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:20px;
}
#small{
  position:fixed;
  bottom:28px;
  left:0;
  right:0;
  font-size:18px;
  opacity:.65;
}
</style>
</head>
<body>
  <div id="prayer">OPEN</div>
  <div id="small">Allow location</div>

<script>
const prayerEl=document.getElementById("prayer");
const smallEl=document.getElementById("small");

function cleanTime(x){
  return String(x).split(" ")[0];
}
function mins(s){
  const parts=cleanTime(s).split(":").map(Number);
  return parts[0]*60+parts[1];
}
function todayForApi(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,"0")}-${String(d.getMonth()+1).padStart(2,"0")}-${d.getFullYear()}`;
}
async function updatePrayer(lat,lon){
  try{
    const url=`https://api.aladhan.com/v1/timings/${todayForApi()}?latitude=${lat}&longitude=${lon}&method=3`;
    const res=await fetch(url,{cache:"no-store"});
    const json=await res.json();
    const t=json.data.timings;
    const order=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
    const nowDate=new Date();
    const now=nowDate.getHours()*60+nowDate.getMinutes();

    let current="Isha";
    for(let i=0;i<order.length;i++){
      const start=mins(t[order[i]]);
      const end=i<order.length-1 ? mins(t[order[i+1]]) : 1440;
      if(now>=start && now<end){
        current=order[i];
        break;
      }
    }

    prayerEl.textContent=current;
    smallEl.textContent="";
  }catch(e){
    prayerEl.textContent="ERROR";
    smallEl.textContent="Check internet";
  }
}
function start(){
  if(!navigator.geolocation){
    prayerEl.textContent="ERROR";
    smallEl.textContent="Location not available";
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;
    updatePrayer(lat,lon);
    setInterval(()=>updatePrayer(lat,lon),60000);
  },err=>{
    prayerEl.textContent="ALLOW";
    smallEl.textContent="Turn on location permission";
  },{enableHighAccuracy:false,timeout:15000,maximumAge:3600000});
}
start();
</script>
</body>
</html>
